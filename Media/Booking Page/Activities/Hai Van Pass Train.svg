<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#F2EDE4"/>
  <rect x="12" y="12" width="476" height="476" fill="none" stroke="#1a1a18" stroke-width="3.5"/>
  
  <!-- Mountains -->
  <polygon points="60,400 180,180 300,400" fill="#1a1a18"/>
  <polygon points="200,400 330,160 460,400" fill="#1a1a18"/>
  <!-- Mountain highlights -->
  <polygon points="180,180 165,230 195,230" fill="#F2EDE4" opacity="0.3"/>
  <polygon points="330,160 315,210 345,210" fill="#F2EDE4" opacity="0.3"/>
  <!-- Sky / clouds -->
  <ellipse cx="120" cy="120" rx="55" ry="30" fill="#1a1a18"/>
  <ellipse cx="155" cy="110" rx="45" ry="28" fill="#1a1a18"/>
  <ellipse cx="135" cy="108" rx="35" ry="22" fill="#F2EDE4"/>
  <ellipse cx="370" cy="105" rx="50" ry="28" fill="#1a1a18"/>
  <ellipse cx="400" cy="100" rx="40" ry="25" fill="#1a1a18"/>
  <ellipse cx="385" cy="98" rx="32" ry="20" fill="#F2EDE4"/>
  <!-- Rail track on mountain -->
  <path d="M 60 390 Q 130 340 200 290 Q 260 248 320 240 Q 380 235 460 245" stroke="#1a1a18" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 60 405 Q 130 355 200 305 Q 260 263 320 255 Q 380 250 460 260" stroke="#1a1a18" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Track ties -->
  <line x1="90" y1="384" x2="85" y2="408" stroke="#1a1a18" stroke-width="7"/>
  <line x1="130" y1="363" x2="125" y2="386" stroke="#1a1a18" stroke-width="7"/>
  <line x1="175" y1="340" x2="170" y2="363" stroke="#1a1a18" stroke-width="7"/>
  <line x1="225" y1="318" x2="220" y2="340" stroke="#1a1a18" stroke-width="7"/>
  <line x1="275" y1="305" x2="272" y2="328" stroke="#1a1a18" stroke-width="7"/>
  <line x1="325" y1="298" x2="323" y2="321" stroke="#1a1a18" stroke-width="7"/>
  <line x1="375" y1="296" x2="374" y2="318" stroke="#1a1a18" stroke-width="7"/>
  <line x1="425" y1="299" x2="425" y2="322" stroke="#1a1a18" stroke-width="7"/>
  <!-- Train body -->
  <rect x="270" y="218" width="130" height="54" rx="10" fill="#1a1a18"/>
  <!-- Train windows -->
  <rect x="285" y="226" width="26" height="22" rx="4" fill="#F2EDE4"/>
  <rect x="320" y="226" width="26" height="22" rx="4" fill="#F2EDE4"/>
  <rect x="355" y="226" width="26" height="22" rx="4" fill="#F2EDE4"/>
  <!-- Train front nose -->
  <rect x="395" y="228" width="30" height="36" rx="8" fill="#1a1a18"/>
  <rect x="398" y="232" width="20" height="16" rx="3" fill="#F2EDE4"/>
  <!-- Train chimney / smoke -->
  <rect x="285" y="204" width="18" height="18" rx="4" fill="#1a1a18"/>
  <ellipse cx="294" cy="195" rx="16" ry="10" fill="#1a1a18"/>
  <ellipse cx="294" cy="188" rx="10" ry="7" fill="#F2EDE4" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="300" cy="272" r="16" fill="#F2EDE4" stroke="#1a1a18" stroke-width="5"/>
  <circle cx="300" cy="272" r="7" fill="#1a1a18"/>
  <circle cx="360" cy="270" r="16" fill="#F2EDE4" stroke="#1a1a18" stroke-width="5"/>
  <circle cx="360" cy="270" r="7" fill="#1a1a18"/>

  <text x="250" y="460" font-family="Georgia, serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1a1a18" letter-spacing="2">HAI VAN PASS TRAIN</text>
</svg>