<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#F2EDE4"/>
  <rect x="12" y="12" width="476" height="476" fill="none" stroke="#1a1a18" stroke-width="3.5"/>
  
  <!-- Candle -->
  <rect x="225" y="250" width="50" height="130" rx="6" fill="#1a1a18"/>
  <ellipse cx="250" cy="250" rx="25" ry="10" fill="#F2EDE4"/>
  <!-- Flame -->
  <path d="M 250 175 Q 232 200 238 228 Q 245 248 250 248 Q 255 248 262 228 Q 268 200 250 175 Z" fill="#1a1a18"/>
  <path d="M 250 192 Q 241 210 244 228 Q 248 244 250 244 Q 252 244 256 228 Q 259 210 250 192 Z" fill="#F2EDE4"/>
  <!-- Left wine glass stem and base -->
  <rect x="140" y="340" width="10" height="80" rx="4" fill="#1a1a18"/>
  <ellipse cx="145" cy="420" rx="32" ry="10" fill="#1a1a18"/>
  <!-- Left glass bowl -->
  <path d="M 110 220 Q 108 280 115 320 Q 125 345 145 345 Q 165 345 175 320 Q 182 280 180 220 Z" fill="#1a1a18"/>
  <path d="M 120 228 Q 118 280 124 315 Q 132 338 145 338 Q 158 338 166 315 Q 172 280 170 228 Z" fill="#F2EDE4"/>
  <!-- Wine in left glass -->
  <path d="M 120 295 Q 118 280 145 278 Q 172 280 170 295 Q 165 338 145 338 Q 125 338 120 295 Z" fill="#1a1a18"/>
  <!-- Right wine glass stem and base -->
  <rect x="350" y="340" width="10" height="80" rx="4" fill="#1a1a18"/>
  <ellipse cx="355" cy="420" rx="32" ry="10" fill="#1a1a18"/>
  <!-- Right glass bowl -->
  <path d="M 320 220 Q 318 280 325 320 Q 335 345 355 345 Q 375 345 385 320 Q 392 280 390 220 Z" fill="#1a1a18"/>
  <path d="M 330 228 Q 328 280 334 315 Q 342 338 355 338 Q 368 338 376 315 Q 382 280 380 228 Z" fill="#F2EDE4"/>
  <!-- Cheers clink lines -->
  <line x1="178" y1="220" x2="222" y2="250" stroke="#1a1a18" stroke-width="7" stroke-linecap="round"/>
  <line x1="322" y1="220" x2="278" y2="250" stroke="#1a1a18" stroke-width="7" stroke-linecap="round"/>
  <!-- Stars/sparkle at clink -->
  <circle cx="200" cy="208" r="7" fill="#1a1a18"/>
  <circle cx="300" cy="208" r="7" fill="#1a1a18"/>
  <!-- Table line -->
  <rect x="60" y="430" width="380" height="16" rx="4" fill="#1a1a18"/>

  <text x="250" y="460" font-family="Georgia, serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1a1a18" letter-spacing="2">ROMANTIC DINNER</text>
</svg>