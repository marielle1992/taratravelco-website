<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#F2EDE4"/>
  <rect x="12" y="12" width="476" height="476" fill="none" stroke="#1a1a18" stroke-width="3.5"/>
  
  <!-- Camera body -->
  <rect x="100" y="200" width="300" height="210" rx="22" fill="#1a1a18"/>
  <!-- Camera top hump (viewfinder) -->
  <rect x="175" y="155" width="110" height="55" rx="12" fill="#1a1a18"/>
  <!-- Lens outer ring -->
  <circle cx="250" cy="305" r="75" fill="#F2EDE4"/>
  <circle cx="250" cy="305" r="62" fill="#1a1a18"/>
  <circle cx="250" cy="305" r="48" fill="#F2EDE4"/>
  <circle cx="250" cy="305" r="34" fill="#1a1a18"/>
  <circle cx="250" cy="305" r="18" fill="#F2EDE4"/>
  <!-- Lens shine -->
  <circle cx="238" cy="293" r="6" fill="#F2EDE4" opacity="0.7"/>
  <!-- Flash/hotshoe -->
  <rect x="205" y="148" width="50" height="12" rx="4" fill="#1a1a18"/>
  <!-- Shutter button -->
  <circle cx="155" cy="200" r="14" fill="#F2EDE4"/>
  <circle cx="155" cy="200" r="8" fill="#1a1a18"/>
  <!-- Viewfinder window -->
  <rect x="183" y="163" width="94" height="38" rx="7" fill="#F2EDE4"/>
  <!-- Strap lugs -->
  <rect x="94" y="228" width="14" height="22" rx="4" fill="#F2EDE4"/>
  <rect x="392" y="228" width="14" height="22" rx="4" fill="#F2EDE4"/>
  <!-- Hatching on body -->
  <line x1="100" y1="240" x2="400" y2="240" stroke="#F2EDE4" stroke-width="2" opacity="0.15"/>
  <line x1="100" y1="260" x2="400" y2="260" stroke="#F2EDE4" stroke-width="2" opacity="0.15"/>

  <text x="250" y="460" font-family="Georgia, serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1a1a18" letter-spacing="2">PHOTOGRAPHY</text>
</svg>