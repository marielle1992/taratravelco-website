<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#F2EDE4"/>
  <rect x="12" y="12" width="476" height="476" fill="none" stroke="#1a1a18" stroke-width="3.5"/>
  
  <!-- Ground -->
  <rect x="80" y="340" width="340" height="16" rx="3" fill="#1a1a18"/>
  <!-- Flag pole -->
  <rect x="310" y="180" width="6" height="162" fill="#1a1a18"/>
  <!-- Flag -->
  <polygon points="316,182 316,226 356,204" fill="#1a1a18"/>
  <!-- Golfer body -->
  <ellipse cx="170" cy="220" rx="28" ry="38" fill="#1a1a18"/>
  <!-- Head -->
  <circle cx="170" cy="175" r="24" fill="#1a1a18"/>
  <!-- Cap brim -->
  <rect x="148" y="162" width="44" height="9" rx="4" fill="#F2EDE4"/>
  <!-- Left arm swing -->
  <line x1="170" y1="225" x2="110" y2="295" stroke="#1a1a18" stroke-width="14" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="170" y1="215" x2="240" y2="255" stroke="#1a1a18" stroke-width="14" stroke-linecap="round"/>
  <!-- Club shaft -->
  <line x1="240" y1="255" x2="100" y2="335" stroke="#1a1a18" stroke-width="7" stroke-linecap="round"/>
  <!-- Club head -->
  <rect x="88" y="328" width="28" height="14" rx="4" fill="#1a1a18"/>
  <!-- Legs -->
  <line x1="158" y1="256" x2="148" y2="340" stroke="#1a1a18" stroke-width="16" stroke-linecap="round"/>
  <line x1="182" y1="256" x2="195" y2="340" stroke="#1a1a18" stroke-width="16" stroke-linecap="round"/>
  <!-- Golf ball -->
  <circle cx="100" cy="337" r="8" fill="#F2EDE4" stroke="#1a1a18" stroke-width="3"/>
  <!-- Hatching texture on body -->
  <line x1="155" y1="200" x2="145" y2="220" stroke="#F2EDE4" stroke-width="2.5" opacity="0.5"/>
  <line x1="165" y1="200" x2="155" y2="220" stroke="#F2EDE4" stroke-width="2.5" opacity="0.5"/>
  <line x1="175" y1="200" x2="165" y2="220" stroke="#F2EDE4" stroke-width="2.5" opacity="0.5"/>

  <text x="250" y="460" font-family="Georgia, serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1a1a18" letter-spacing="2">GOLF</text>
</svg>